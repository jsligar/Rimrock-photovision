services:
  rimrock:
    image: rimrock-photovision-rimrock:latest
    build:
      context: .
      dockerfile: Dockerfile.jetson
      network: host
    container_name: rimrock-photovision
    runtime: nvidia
    network_mode: host
    ipc: host
    working_dir: /workspace/rimrock-photovision
    environment:
      RIMROCK_IN_CONTAINER: "1"
      PYTHONUNBUFFERED: "1"
      NVIDIA_VISIBLE_DEVICES: all
      NVIDIA_DRIVER_CAPABILITIES: all
      YOLO_MODEL: "yolov8s.engine"
      TRT_ENGINE_CACHE: "/root/.insightface/trt_engines"
    volumes:
      - ./:/workspace/rimrock-photovision
      - /local/rimrock/photos:/local/rimrock/photos
      - /mnt/mycloud/photos:/mnt/mycloud/photos:ro
      - ${HOME}/.cache/torch:/root/.cache/torch
      - ${HOME}/.cache/clip:/root/.cache/clip
      - ${HOME}/.insightface:/root/.insightface
    command: [
      "python3", "-m", "uvicorn",
      "api.main:app",
      "--app-dir", "/workspace/rimrock-photovision",
      "--host", "0.0.0.0",
      "--port", "8420"
    ]
    restart: unless-stopped
    stop_signal: SIGTERM
    stop_grace_period: 30s
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8420/api/status"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
