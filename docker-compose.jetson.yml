services:
  rimrock:
    image: rimrock-photovision-rimrock:latest
    build:
      context: .
      dockerfile: Dockerfile.jetson
      network: host
    container_name: rimrock-photovision
    runtime: nvidia
    network_mode: host
    ipc: host
    working_dir: /workspace/rimrock-photovision
    environment:
      RIMROCK_IN_CONTAINER: "1"
      PYTHONUNBUFFERED: "1"
      NVIDIA_VISIBLE_DEVICES: all
      NVIDIA_DRIVER_CAPABILITIES: all
      # ORT TensorRT provider settings
      ORT_TENSORRT_ENGINE_CACHE_ENABLE: "1"
      ORT_TENSORRT_CACHE_PATH: /local/rimrock/trt_cache
      ORT_TENSORRT_FP16_ENABLE: "1"
      # YOLO model — TensorRT engine exported in-container
      YOLO_MODEL: "yolov8s.engine"
    volumes:
      - ./:/workspace/rimrock-photovision
      - /local/rimrock/photos:/local/rimrock/photos
      - /mnt/mycloud/photos:/mnt/mycloud/photos:ro
      - ${HOME}/.cache/torch:/root/.cache/torch
      - ${HOME}/.cache/clip:/root/.cache/clip
      - ${HOME}/.insightface:/root/.insightface
      - /local/rimrock/trt_cache:/local/rimrock/trt_cache
    command: ["sleep", "infinity"]
